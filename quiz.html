<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Quiz</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="wrap headrow">
    <div>
      <a class="back" href="index.html">← Back</a>
      <h1 id="quizTitle">Quiz</h1>
      <p class="sub" id="quizMeta"></p>
    </div>
    <div class="controls">
      <button class="btn" id="shuffleBtn" type="button">Shuffle</button>
      <button class="btn" id="missedBtn" type="button">Missed-first</button>
      <button class="btn danger" id="resetDeck" type="button">Reset quiz</button>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="row space">
        <div class="pill">Multiple Choice</div>
        <div class="muted" id="counter"></div>
      </div>

      <div class="qa">
        <div class="q" id="question"></div>
      </div>

      <div id="choices" class="choices"></div>

      <div class="row space" style="margin-top:10px">
        <div class="muted" id="feedback"></div>
        <button class="btn" id="nextBtn" type="button">Next</button>
      </div>

      <hr/>

      <div class="dash">
        <div class="metric">
          <div class="label">Attempts</div>
          <div class="value" id="dAttempts">0</div>
        </div>
        <div class="metric">
          <div class="label">Correct</div>
          <div class="value" id="dCorrect">0</div>
        </div>
        <div class="metric">
          <div class="label">Accuracy</div>
          <div class="value" id="dAcc">0%</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <div class="settings">
        <label class="field">
          <span>Choices</span>
          <select id="choicesN">
            <option value="4">4 choices</option>
            <option value="5">5 choices</option>
          </select>
        </label>
        <label class="field">
          <span>Question direction</span>
          <select id="direction">
            <option value="q2a">Question → Answer</option>
            <option value="a2q">Answer → Question</option>
            <option value="mix">Mixed</option>
          </select>
        </label>
      </div>
      <p class="hint">“Missed-first” prioritizes items you’ve missed more often in this browser.</p>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    QuizApp.initQuiz();
  </script>
</body>
</html>
